<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería CSS Grid</title>
    <link rel="stylesheet" href="gallery.css">
</head>

<body>
    <h1>Mi Galería</h1>
    <div class="gallery">
        <div class="gallery__item gallery__item--featured">
            <img src="https://picsum.photos/600/400?random=1" alt="Foto 1">
        </div>
        <div class="gallery__item">
            <img src="https://picsum.photos/300/300?random=2" alt="Foto 2">
        </div>
        <div class="gallery__item">
            <img src="https://picsum.photos/300/300?random=3" alt="Foto 3">
        </div>
        <div class="gallery__item gallery__item--tall">
            <img src="https://picsum.photos/300/600?random=4" alt="Foto 4">
        </div>
        <div class="gallery__item">
            <img src="https://picsum.photos/300/300?random=5" alt="Foto 5">
        </div>
        <div class="gallery__item">
            <img src="https://picsum.photos/300/300?random=6" alt="Foto 6">
        </div>
    </div>
</body>

</html>
