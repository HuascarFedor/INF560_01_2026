<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --item1: #2D5F8A;
            --item2: #0F766E;
            --item3: #92400E;
            --item4: #1E3A5F;
            --item5: #475569;
        }

        .flex-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content:space-evenly;
            align-items: center;
            align-content:space-around;
            gap: 0px;
            border: 1px dashed black;
            height: 400px;
        }

        .flex-item {
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color:black;
            
            padding: 0.5rem;
            background-color: orange;
            width: 400px;            
        }
    </style>
</head>

<body>
    <section class="flex-container">
        <article class="flex-item">1</article>
        <article class="flex-item">2</article>
        <article class="flex-item">3</article>
        <article class="flex-item">4</article>
        <article class="flex-item">5</article>
        <article class="flex-item">6</article>
        <article class="flex-item">7</article>
        <article class="flex-item">8</article>
        <article class="flex-item">9</article>
    </section>
</body>

</html>
